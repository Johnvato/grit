name: Daily Data Sync

on:
  schedule:
    - cron: '0 13 * * *'  # Runs daily at 1pm UTC (midnight AEST)
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild schema (idempotent)
        run: python build_schema.py

      - name: Import curated profiles
        run: python import_profiles.py

      - name: Run sync script
        env:
          TVFY_API_KEY: ${{ secrets.TVFY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python sync_data.py

      - name: Commit updated database
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'bot@noreply.github.com'
          git add grit_cache.db
          git commit -m "Automated database sync $(date -u +%Y-%m-%d)" || exit 0
          git push
